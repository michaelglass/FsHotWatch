name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: FsHotWatch.slnx
      fantomas-paths: 'src/ tests/'
      # Host FSharpLint in-process via FSharpLintAnalyzerShim + fshw's
      # AnalyzersPlugin. Reuses the warm FSharpChecker instead of spinning
      # up a fresh compiler per project — ~9x faster than `dotnet fsharplint`.
      lint-cmd: 'dotnet run --project src/FsHotWatch.Cli --no-build -- analyze --run-once'
