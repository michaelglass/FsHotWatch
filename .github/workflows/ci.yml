name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: FsHotWatch.slnx
      fantomas-paths: 'src/ tests/'
      # Apply our coverage exclusions on CI too — without this, the reusable
      # workflow's `dotnet test --coverage` ignores coverage.settings and the
      # sibling TestPrune.Core sources leak into the cobertura XML at 0%.
      # Relative path — the workflow's `dotnet test` runs from the repo root.
      test-extra-args: '--coverage-settings coverage.settings'
      # Host FSharpLint via AnalyzersPlugin to reuse the warm FSharpChecker
      # instead of spawning a fresh compiler per project.
      lint-cmd: 'dotnet run --project src/FsHotWatch.Cli --no-build -- analyze --run-once'
      # Clone the sibling TestPrune repo one level up from the checkout so
      # the temporary ProjectReference in FsHotWatch.TestPrune.fsproj can resolve
      # (TODO(testprune-3.1): revert to PackageReference when TestPrune.Core 3.1
      # ships to NuGet, then remove this clone step).
      pre-build-cmd: |
        git clone --depth 1 https://github.com/michaelglass/TestPrune.git ../TestPrune
        # Re-run restore now that the sibling exists. The reusable workflow's
        # `dotnet restore` ran before this hook (see michaels-wacky-build.yml)
        # and cached "ProjectReference not found", so the subsequent
        # `dotnet build --no-restore` would fail to copy TestPrune.Core.dll
        # into FsHotWatch.Cli's bin dir without this re-restore.
        dotnet restore
