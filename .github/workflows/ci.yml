name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: FsHotWatch.slnx
      fantomas-paths: 'src/ tests/'
      # Host FSharpLint via AnalyzersPlugin to reuse the warm FSharpChecker
      # instead of spawning a fresh compiler per project.
      lint-cmd: 'dotnet run --project src/FsHotWatch.Cli --no-build -- analyze --run-once'
      # Install jj so JjHelper code paths (commit-id / diff) are exercised in tests.
      # Also clone the sibling TestPrune repo one level up from the checkout so
      # the temporary ProjectReference in FsHotWatch.TestPrune.fsproj can resolve
      # (TODO(testprune-3.1): revert to PackageReference when TestPrune.Core 3.1
      # ships to NuGet, then remove this clone step).
      pre-build-cmd: |
        curl -sSL https://github.com/jj-vcs/jj/releases/download/v0.40.0/jj-v0.40.0-x86_64-unknown-linux-musl.tar.gz \
          | sudo tar xz -C /usr/local/bin ./jj
        jj --version
        jj git init --colocate
        git clone --depth 1 https://github.com/michaelglass/TestPrune.git ../TestPrune
        # Restore the sibling ProjectReference explicitly — the reusable build
        # workflow only restores FsHotWatch.slnx, which doesn't list TestPrune.Core.
        dotnet restore ../TestPrune/src/TestPrune.Core/TestPrune.Core.fsproj
