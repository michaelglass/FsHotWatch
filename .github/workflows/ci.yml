name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'core-v*'
      - 'testprune-v*'
      - 'analyzers-v*'
      - 'lint-v*'
      - 'fantomas-v*'
      - 'build-v*'
      - 'coverage-v*'
      - 'filecommand-v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write  # For creating releases
  checks: write
  pull-requests: write
  id-token: write  # For NuGet trusted publishing (OIDC)
  pages: write     # For GitHub Pages deployment

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.check-existing.outputs.skip }}
      prior-run-id: ${{ steps.check-existing.outputs.prior-run-id }}

    steps:
      - name: Check for existing successful build on this commit
        id: check-existing
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
              per_page: 10,
            });
            const priorRun = runs.data.workflow_runs.find(run =>
              run.conclusion === 'success' && run.id !== context.runId
            );
            const skip = !!priorRun;
            core.setOutput('skip', skip.toString());
            if (priorRun) {
              core.setOutput('prior-run-id', priorRun.id.toString());
              core.info(`Skipping build — run ${priorRun.id} already succeeded for ${context.sha}`);
            }

      - uses: actions/checkout@v4
        if: steps.check-existing.outputs.skip != 'true'

      - name: Setup .NET
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet restore

      - name: Restore tools
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet tool restore

      - name: Build
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet build --no-restore

      - name: Check formatting
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet run --project src/FsHotWatch.Cli --no-build -- format-check run-once

      - name: Lint
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet fsharplint lint FsHotWatch.slnx

      - name: Check docs sync
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet fsi scripts/sync-docs.fsx --check

      - name: Generate docs
        if: steps.check-existing.outputs.skip != 'true'
        run: dotnet fsdocs build --output output/docs --clean --parameters root /FsHotWatch/

      - name: Upload docs artifact
        if: steps.check-existing.outputs.skip != 'true' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: output/docs

      - name: Test with coverage
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          dotnet test --no-build --verbosity normal \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output "$PWD/coverage/coverage.cobertura.xml"

      - name: Generate coverage report
        if: steps.check-existing.outputs.skip != 'true'
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ./coverage/coverage.cobertura.xml
          targetdir: ./coverage/report
          reporttypes: Cobertura;MarkdownSummaryGithub;Html

      - name: Check coverage threshold
        if: steps.check-existing.outputs.skip != 'true'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./coverage/report/Cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: '50 70'

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: steps.check-existing.outputs.skip != 'true' && github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: steps.check-existing.outputs.skip != 'true' && always()
        with:
          name: coverage-report
          path: ./coverage/report

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/core-v') || startsWith(github.ref, 'refs/tags/testprune-v') || startsWith(github.ref, 'refs/tags/analyzers-v') || startsWith(github.ref, 'refs/tags/lint-v') || startsWith(github.ref, 'refs/tags/fantomas-v') || startsWith(github.ref, 'refs/tags/build-v') || startsWith(github.ref, 'refs/tags/coverage-v') || startsWith(github.ref, 'refs/tags/filecommand-v'))
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Check for stable version tags
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          STABLE=$(git tag -l 'core-v*' 'testprune-v*' 'analyzers-v*' 'lint-v*' 'fantomas-v*' 'build-v*' 'coverage-v*' 'filecommand-v*' | grep -cvE '(alpha|beta|rc)' || true)
          echo "has_stable=$([[ "$STABLE" -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT

          # Determine which package owns this tag
          if [[ "$TAG" == core-v* ]]; then echo "package=core" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == testprune-v* ]]; then echo "package=testprune" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == analyzers-v* ]]; then echo "package=analyzers" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == lint-v* ]]; then echo "package=lint" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == fantomas-v* ]]; then echo "package=fantomas" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == build-v* ]]; then echo "package=build" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == coverage-v* ]]; then echo "package=coverage" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == filecommand-v* ]]; then echo "package=filecommand" >> $GITHUB_OUTPUT
          fi

      - name: Download docs artifact
        if: (steps.check.outputs.is_prerelease == 'false' || steps.check.outputs.has_stable == 'false') && needs.build.outputs.skipped != 'true'
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: /tmp/docs-output

      - name: Download docs artifact from prior run
        if: (steps.check.outputs.is_prerelease == 'false' || steps.check.outputs.has_stable == 'false') && needs.build.outputs.skipped == 'true'
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: /tmp/docs-output
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.build.outputs.prior-run-id }}

      - name: Deploy to gh-pages branch
        if: steps.check.outputs.is_prerelease == 'false' || steps.check.outputs.has_stable == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean working tree so we can switch branches
          git clean -fd
          git checkout -- .

          # Create gh-pages branch if it doesn't exist
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          PACKAGE="${{ steps.check.outputs.package }}"
          if [[ "$PACKAGE" == "core" ]]; then
            # Core owns everything except per-package subdirectories and their API references
            rsync -a --delete \
              --exclude='.git' \
              --exclude='FsHotWatch.TestPrune/' \
              --exclude='FsHotWatch.Analyzers/' \
              --exclude='FsHotWatch.Lint/' \
              --exclude='FsHotWatch.Fantomas/' \
              --exclude='FsHotWatch.Build/' \
              --exclude='FsHotWatch.Coverage/' \
              --exclude='FsHotWatch.FileCommand/' \
              --exclude='reference/fshotwatch-testprune-*' \
              --exclude='reference/fshotwatch-analyzers-*' \
              --exclude='reference/fshotwatch-lint-*' \
              --exclude='reference/fshotwatch-fantomas-*' \
              --exclude='reference/fshotwatch-build-*' \
              --exclude='reference/fshotwatch-coverage-*' \
              --exclude='reference/fshotwatch-filecommand-*' \
              --filter='protect .git' \
              --filter='protect FsHotWatch.TestPrune/' \
              --filter='protect FsHotWatch.Analyzers/' \
              --filter='protect FsHotWatch.Lint/' \
              --filter='protect FsHotWatch.Fantomas/' \
              --filter='protect FsHotWatch.Build/' \
              --filter='protect FsHotWatch.Coverage/' \
              --filter='protect FsHotWatch.FileCommand/' \
              --filter='protect reference/fshotwatch-testprune-*' \
              --filter='protect reference/fshotwatch-analyzers-*' \
              --filter='protect reference/fshotwatch-lint-*' \
              --filter='protect reference/fshotwatch-fantomas-*' \
              --filter='protect reference/fshotwatch-build-*' \
              --filter='protect reference/fshotwatch-coverage-*' \
              --filter='protect reference/fshotwatch-filecommand-*' \
              /tmp/docs-output/ ./
          else
            # Map package name to docs directory and reference prefix
            declare -A PKG_DIR=(
              [testprune]="FsHotWatch.TestPrune"
              [analyzers]="FsHotWatch.Analyzers"
              [lint]="FsHotWatch.Lint"
              [fantomas]="FsHotWatch.Fantomas"
              [build]="FsHotWatch.Build"
              [coverage]="FsHotWatch.Coverage"
              [filecommand]="FsHotWatch.FileCommand"
            )
            declare -A PKG_REF=(
              [testprune]="fshotwatch-testprune"
              [analyzers]="fshotwatch-analyzers"
              [lint]="fshotwatch-lint"
              [fantomas]="fshotwatch-fantomas"
              [build]="fshotwatch-build"
              [coverage]="fshotwatch-coverage"
              [filecommand]="fshotwatch-filecommand"
            )
            DIR="${PKG_DIR[$PACKAGE]}"
            REF="${PKG_REF[$PACKAGE]}"

            mkdir -p "$DIR" reference
            rsync -a --delete "/tmp/docs-output/$DIR/" "./$DIR/"
            rsync -a /tmp/docs-output/reference/${REF}-* ./reference/ 2>/dev/null || true
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to deploy"
          else
            git commit -m "Deploy $PACKAGE docs from ${GITHUB_REF#refs/tags/}"
            git push origin gh-pages
          fi

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack FsHotWatch
        run: dotnet pack src/FsHotWatch/FsHotWatch.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Cli
        run: dotnet pack src/FsHotWatch.Cli/FsHotWatch.Cli.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.TestPrune
        run: dotnet pack src/FsHotWatch.TestPrune/FsHotWatch.TestPrune.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Analyzers
        run: dotnet pack src/FsHotWatch.Analyzers/FsHotWatch.Analyzers.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Lint
        run: dotnet pack src/FsHotWatch.Lint/FsHotWatch.Lint.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Fantomas
        run: dotnet pack src/FsHotWatch.Fantomas/FsHotWatch.Fantomas.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Build
        run: dotnet pack src/FsHotWatch.Build/FsHotWatch.Build.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.Coverage
        run: dotnet pack src/FsHotWatch.Coverage/FsHotWatch.Coverage.fsproj -c Release -o ./artifacts

      - name: Pack FsHotWatch.FileCommand
        run: dotnet pack src/FsHotWatch.FileCommand/FsHotWatch.FileCommand.fsproj -c Release -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  release-core:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/core-v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack FsHotWatch
        run: dotnet pack src/FsHotWatch/FsHotWatch.fsproj -c Release --no-build -o ./artifacts

      - name: Pack FsHotWatch.Cli
        run: dotnet pack src/FsHotWatch.Cli/FsHotWatch.Cli.fsproj -c Release --no-build -o ./artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/core-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FsHotWatch v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

