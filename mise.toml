[tools]
dotnet = "10.0"

# === Infrastructure tasks (not daemon-backed) ===

[tasks.restore]
description = "Restore dependencies"
run = "dotnet restore"

[tasks.tool-restore]
description = "Restore local dotnet tools"
run = "dotnet tool restore"

# === Daemon-backed tasks ===
# These auto-start the daemon if not running, then block until done.

[tasks.build]
description = "Build via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- build"
depends = ["build"]

[tasks.test]
description = "Run tests via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- test"
depends = ["build"]

[tasks.format]
description = "Format code via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- format"
depends = ["build"]

[tasks.lint]
description = "Lint via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- lint"
depends = ["build"]

[tasks.errors]
description = "Show accumulated errors"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- errors"
depends = ["build"]

[tasks.check]
description = "Run all checks via daemon (auto-starts daemon if needed)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- check"
depends = ["build", "lint-project"]
# Note: depends on build to ensure CLI binary is compiled.
# The daemon handles its own build/test/lint cycle internally.

[tasks.cache-clear]
description = "Clear the check result cache"
run = "rm -rf .fshw/cache/"

# === Direct tasks (CI, docs, packaging) ===

[tasks.test-direct]
description = "Run tests directly with coverage (for CI)"
run = """
dotnet test \
  --coverage \
  --coverage-output-format cobertura \
  --coverage-output "$PWD/coverage/coverage.cobertura.xml" \
  --coverage-settings "$PWD/coverage.settings"
"""
depends = ["restore"]

[tasks.format-check]
description = "Check formatting (single pass)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- format-check run-once"
depends = ["build"]

[tasks.lint-direct]
description = "Run linter (single pass)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- lint run-once"
depends = ["build"]

[tasks.coverage-check]
description = "Check per-file coverage meets minimum threshold"
run = "dotnet tool run coverageratchet check coverage-ratchet-FsHotWatch.json"
depends = ["test-direct"]

[tasks.coverage-ratchet]
description = "Ratchet coverage thresholds to current values"
run = "dotnet tool run coverageratchet ratchet coverage-ratchet-FsHotWatch.json"
depends = ["test-direct"]

[tasks.lint-project]
description = "Lint fsproj files"
run = "dotnet tool run fsprojlint"
depends = ["tool-restore"]

[tasks.check-api]
description = "Check API changes since last release"
run = "dotnet tool run fssemantictagger check"
depends = ["restore"]

[tasks.sync-docs]
description = "Sync README content to docs/"
run = "dotnet tool run syncdocs sync"

[tasks.sync-docs-check]
description = "Check if docs/ is in sync with READMEs"
run = "dotnet tool run syncdocs check"

[tasks.release]
description = "Tag a release based on API changes"
run = "dotnet tool run fssemantictagger release"
depends = ["restore"]

[tasks.release-alpha]
description = "Tag an alpha release"
run = "dotnet tool run fssemantictagger release --prerelease alpha"
depends = ["restore"]

[tasks.ci]
description = "Run all CI checks (single pass, no daemon)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- check run-once"
depends = ["build", "lint-project"]

[tasks.run]
description = "Run the CLI"
run = "dotnet run --project src/FsHotWatch.Cli --"
depends = ["restore"]

[tasks.pack]
description = "Create NuGet packages"
run = """
dotnet pack src/FsHotWatch/FsHotWatch.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Cli/FsHotWatch.Cli.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.TestPrune/FsHotWatch.TestPrune.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Analyzers/FsHotWatch.Analyzers.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Lint/FsHotWatch.Lint.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Fantomas/FsHotWatch.Fantomas.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Build/FsHotWatch.Build.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Coverage/FsHotWatch.Coverage.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.FileCommand/FsHotWatch.FileCommand.fsproj -c Release -o artifacts
"""
depends = ["restore"]

[tasks.docs]
description = "Generate API documentation"
run = "dotnet fsdocs build --output output/docs --clean --parameters root /FsHotWatch/"
depends = ["restore", "tool-restore"]

[tasks.docs-watch]
description = "Watch and serve documentation locally"
run = "dotnet fsdocs watch"
depends = ["restore", "tool-restore"]
