[tools]
dotnet = "10.0"

# === Infrastructure tasks (not daemon-backed) ===

[tasks.restore]
description = "Restore dependencies"
run = "dotnet restore"

[tasks.tool-restore]
description = "Restore local dotnet tools"
run = "dotnet tool restore"

# === Daemon-backed tasks ===
# These auto-start the daemon if not running, then block until done.

[tasks.build]
description = "Build via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- build"
depends = ["build"]

[tasks.test]
description = "Run tests via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- test"
depends = ["build"]

[tasks.format]
description = "Format code via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- format"
depends = ["build"]

[tasks.lint]
description = "Lint via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- lint"
depends = ["build"]

[tasks.errors]
description = "Show accumulated errors"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- errors"
depends = ["build"]

[tasks.check]
description = "Run all checks via daemon (auto-starts daemon if needed)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- check"
depends = ["build", "lint-project", "coverage-ratchet"]
# Note: depends on build to ensure CLI binary is compiled.
# The daemon handles its own build/test/lint cycle internally.
# Uses coverage-ratchet (auto-tighten) on purpose: this is the dev-tool entry
# point, and like Fantomas auto-fixing format on save, the threshold file is
# auto-corrected to lock in coverage gains as they happen.
# This requires coverage to be DETERMINISTIC: if a test in the coverage suite
# causes coverage to fluctuate run-to-run, that test belongs in the integration
# suite (tests/FsHotWatch.IntegrationTests, no coverage) instead. Don't paper
# over instability by loosening thresholds — fix the test placement.
# CI uses `mise run ci`, which invokes `coverage-check` and fails on regression.

[tasks.cache-clear]
description = "Clear the check result cache"
run = "rm -rf .fshw/cache/"

# === Direct tasks (CI, docs, packaging) ===

[tasks.test-direct]
description = "Run tests directly with coverage (for CI). Excludes IntegrationTests whose SDK-reflection paths fire nondeterministically and make the coverage ratchet flaky."
# Wipe any stale per-project coverage the daemon may have written to
# coverage/<project>/ in prior runs — coverageratchet walks the tree and
# would otherwise see TestPrune.Core sources (from the sibling ProjectReference)
# that aren't filtered by coverage.settings in the daemon path.
run = """
rm -rf coverage
dotnet test --project tests/FsHotWatch.Tests/FsHotWatch.Tests.fsproj \
  --coverage \
  --coverage-output-format cobertura \
  --coverage-output "$PWD/coverage/coverage.cobertura.xml" \
  --coverage-settings "$PWD/coverage.settings"
"""
depends = ["restore"]

[tasks.test-integration]
description = "Run integration tests (FCS / analyzers / lint / format / build end-to-end). No coverage."
run = "dotnet test --project tests/FsHotWatch.IntegrationTests/FsHotWatch.IntegrationTests.fsproj"
depends = ["restore"]

[tasks.format-check]
description = "Check formatting (single pass)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- format-check --run-once"
depends = ["build"]

[tasks.lint-direct]
description = "Run linter (single pass)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- lint --run-once"
depends = ["build"]

[tasks.coverage-check]
description = "Check per-file coverage meets minimum threshold"
run = "dotnet tool run coverageratchet check coverage-ratchet-FsHotWatch.json"
depends = ["test-direct"]

[tasks.coverage-ratchet]
description = "Auto-correct coverage thresholds: tighten on rise, shrink on drift"
# Try ratchet (tightens on rising coverage; preferred when coverage actually
# improves). Fall back to loosen if any file has fallen below threshold so
# the dev loop continues. Net effect: thresholds always track current
# coverage, locking in gains, accepting noise.
# CI uses `mise run ci` → `coverage-check` (no auto-correct) to gate on
# real regressions. Coverage drift on borderline files is a test-suite bug
# (move flaky tests to FsHotWatch.IntegrationTests, no coverage); this
# wrapper exists so dev velocity isn't blocked while flakes get cleaned up.
run = """sh -c '
  dotnet tool run coverageratchet ratchet coverage-ratchet-FsHotWatch.json
  c=$?
  # 0 = tightened, 1 = nothing to tighten — both fine.
  # 2 = below threshold (drift) — fall back to loosen.
  # Any other code = tool crash; propagate so we do not silently rewrite
  # thresholds when the tool itself misbehaved.
  [ $c -eq 0 ] && exit 0
  [ $c -eq 1 ] && exit 0
  [ $c -ne 2 ] && exit $c
  dotnet tool run coverageratchet loosen coverage-ratchet-FsHotWatch.json
'"""
depends = ["test-direct"]

[tasks.coverage-loosen]
description = "Loosen coverage thresholds to current values"
run = "dotnet tool run coverageratchet loosen coverage-ratchet-FsHotWatch.json"
depends = ["test-direct"]

[tasks.loosen-from-ci]
description = "Merge coverage thresholds from CI artifacts"
run = "dotnet tool run coverageratchet loosen-from-ci coverage-ratchet-FsHotWatch.json"
depends = ["test-direct"]

[tasks.lint-project]
description = "Lint fsproj files"
run = "dotnet tool run fsprojlint"
depends = ["tool-restore"]

[tasks.check-api]
description = "Check API changes since last release"
run = "dotnet tool run fssemantictagger check"
depends = ["restore"]

[tasks.sync-docs]
description = "Sync README content to docs/"
run = "dotnet tool run syncdocs sync"

[tasks.sync-docs-check]
description = "Check if docs/ is in sync with READMEs"
run = "dotnet tool run syncdocs check"

[tasks.release]
description = "Tag a release based on API changes"
run = "dotnet tool run fssemantictagger release"
depends = ["restore"]

[tasks.release-dry-run]
description = "Preview a release without mutating (no tag, no publish)"
run = "dotnet tool run fssemantictagger release --dry-run"
depends = ["restore"]

[tasks.release-alpha]
description = "Tag an alpha release"
run = "dotnet tool run fssemantictagger release --prerelease alpha"
depends = ["restore"]

[tasks.compile]
description = "Compile the solution (dotnet build)"
run = "dotnet build"
depends = ["restore"]

[tasks.ci]
description = "Run all CI checks (single pass, no daemon)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- check --run-once"
depends = ["compile", "lint-project", "coverage-check"]

[tasks.run]
description = "Run the CLI"
run = "dotnet run --project src/FsHotWatch.Cli --"
depends = ["restore"]

[tasks.pack]
description = "Create NuGet packages"
run = """
dotnet pack src/FsHotWatch/FsHotWatch.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Cli/FsHotWatch.Cli.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.TestPrune/FsHotWatch.TestPrune.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Analyzers/FsHotWatch.Analyzers.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Lint/FsHotWatch.Lint.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Fantomas/FsHotWatch.Fantomas.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Build/FsHotWatch.Build.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.FileCommand/FsHotWatch.FileCommand.fsproj -c Release -o artifacts
"""
depends = ["restore"]

[tasks.docs]
description = "Generate API documentation"
run = "dotnet fsdocs build --output output/docs --clean --parameters root /FsHotWatch/"
depends = ["restore", "tool-restore"]

[tasks.docs-watch]
description = "Watch and serve documentation locally"
run = "dotnet fsdocs watch"
depends = ["restore", "tool-restore"]
