[tools]
dotnet = "10.0"

# === Infrastructure tasks (not daemon-backed) ===

[tasks.restore]
description = "Restore dependencies"
run = "dotnet restore"

[tasks.tool-restore]
description = "Restore local dotnet tools"
run = "dotnet tool restore"

# === Daemon-backed tasks ===
# These auto-start the daemon if not running, then block until done.

[tasks.build]
description = "Build via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- build"
depends = ["build"]

[tasks.test]
description = "Run tests via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- test"
depends = ["build"]

[tasks.format]
description = "Format code via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- format"
depends = ["build"]

[tasks.lint]
description = "Lint via daemon"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- lint"
depends = ["build"]

[tasks.errors]
description = "Show accumulated errors"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- errors"
depends = ["build"]

[tasks.check]
description = "Run all checks via daemon (auto-starts daemon if needed)"
run = "dotnet run --project src/FsHotWatch.Cli --no-build -- --verbose check"
depends = ["build"]
# Note: depends on build to ensure CLI binary is compiled.
# The daemon handles its own build/test/lint cycle internally.

# === Direct tasks (CI, docs, packaging) ===

[tasks.test-direct]
description = "Run tests directly with coverage (for CI)"
run = """
dotnet test \
  --coverage \
  --coverage-output-format cobertura \
  --coverage-output "$PWD/coverage/coverage.cobertura.xml" \
  --coverage-settings "$PWD/coverage.settings"
"""
depends = ["restore"]

[tasks.format-check]
description = "Check formatting without making changes"
run = "dotnet fantomas src/ tests/ --check"
depends = ["tool-restore"]

[tasks.lint-direct]
description = "Run FSharpLint directly (for CI)"
run = "dotnet fsharplint lint FsHotWatch.slnx"
depends = ["restore", "tool-restore"]

[tasks.coverage-check]
description = "Check per-file coverage meets minimum threshold"
run = "dotnet fsi scripts/check-coverage.fsx"
depends = ["test-direct"]

[tasks.check-api]
description = "Check API changes since last release"
run = "dotnet fsi scripts/check-api.fsx"
depends = ["restore"]

[tasks.sync-docs]
description = "Sync README.md content to docs/index.md"
run = "dotnet fsi scripts/sync-docs.fsx"

[tasks.sync-docs-check]
description = "Check if docs/index.md is in sync with README.md"
run = "dotnet fsi scripts/sync-docs.fsx --check"

[tasks.ci]
description = "Run all CI checks (no daemon, no auto-fix)"
depends = ["format-check", "lint-direct", "coverage-check", "sync-docs-check", "docs"]

[tasks.run]
description = "Run the CLI"
run = "dotnet run --project src/FsHotWatch.Cli --"
depends = ["restore"]

[tasks.pack]
description = "Create NuGet packages"
run = """
dotnet pack src/FsHotWatch/FsHotWatch.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Cli/FsHotWatch.Cli.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.TestPrune/FsHotWatch.TestPrune.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Analyzers/FsHotWatch.Analyzers.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Lint/FsHotWatch.Lint.fsproj -c Release -o artifacts
dotnet pack src/FsHotWatch.Fantomas/FsHotWatch.Fantomas.fsproj -c Release -o artifacts
"""
depends = ["restore"]

[tasks.docs]
description = "Generate API documentation"
run = "dotnet fsdocs build --output output/docs --clean"
depends = ["restore", "tool-restore"]

[tasks.docs-watch]
description = "Watch and serve documentation locally"
run = "dotnet fsdocs watch"
depends = ["restore", "tool-restore"]
